        const grid = document.getElementById('gridContainer');
        const searchInput = document.getElementById('searchInput');
        const filterCountry = document.getElementById('filterCountry');
        const filterTag = document.getElementById('filterTag');
        const filterYear = document.getElementById('filterYear');
        const sortSelect = document.getElementById('sortSelect');
        const resultsCount = document.getElementById('resultsCount');

        const countries = new Set(), tags = new Set();
        companiesData.forEach(c => { 
            if(c.country !== 'Unknown') countries.add(c.country); 
            c.tags.forEach(t => tags.add(t)); 
        });
        [...countries].sort().forEach(c => filterCountry.add(new Option(c, c)));
        [...tags].sort().forEach(t => filterTag.add(new Option(t, t)));

        const tagColors = {
            'Hardware': '#ef4444', 'Software': '#3b82f6', 'Control Systems': '#f59e0b',
            'Networking': '#10b981', 'Sensing': '#ec4899', 'Security/Cryptography': '#8b5cf6',
            'Cryogenics': '#06b6d4', 'Photonics/Lasers': '#f43f5e', 'Superconducting Qubits': '#14b8a6',
            'Trapped-Ion Qubits': '#f59e0b', 'Neutral Atom Qubits': '#84cc16', 'Photonic Qubits': '#e879f9',
            'Silicon Spin Qubits': '#0ea5e9', 'Emerging Qubit Modalities': '#d946ef',
            'Industry Applications': '#8b5cf6', 'Error Mitigation & Correction': '#f97316'
        };

        function render() {
            const q = searchInput.value.toLowerCase(), c = filterCountry.value, t = filterTag.value;
            const yearMin = parseInt(filterYear.value, 10);
            const sortBy = sortSelect.value;
            let filtered = companiesData.filter(comp => 
                (comp.name.toLowerCase().includes(q) || comp.location.toLowerCase().includes(q) || comp.country.toLowerCase().includes(q) || comp.description.toLowerCase().includes(q) || comp.tags.join(' ').toLowerCase().includes(q)) &&
                (c === 'All' || comp.country === c) && (t === 'All' || comp.tags.includes(t)) &&
                (yearMin === 0 || comp.year_int >= yearMin)
            );

            filtered.sort((a, b) => {
                if (sortBy === 'name_asc') return a.name.localeCompare(b.name);
                if (sortBy === 'name_desc') return b.name.localeCompare(a.name);
                if (sortBy === 'year_desc') return b.year_int - a.year_int;
                if (sortBy === 'year_asc') return a.year_int - b.year_int;
                return 0;
            });

            resultsCount.textContent = `Showing ${filtered.length} of ${companiesData.length} companies`;
            
            grid.innerHTML = filtered.map((comp, i) => `
                <div class="card" style="animation-delay:${(i % 12) * 0.04}s">
                    <div class="card-title">${comp.name}</div>
                    <a href="${comp.url}" target="_blank" class="card-url">${comp.url}</a>
                    <div class="meta-item">📍 ${comp.location}</div>
                    ${comp.year ? `<div class="meta-item">📅 Founded: ${comp.year}</div>` : ''}
                    ${comp.size ? `<div class="meta-item">👥 Size: ${comp.size} employees</div>` : ''}
                    
                    <span class="section-label">Category / Tech Overview</span>
                    <span class="section-content">${comp.parsed_desc.category || comp.description}</span>
                    
                    ${comp.parsed_desc.products ? `<span class="section-label">Key Products</span><span class="section-content">${comp.parsed_desc.products}</span>` : ''}
                    ${comp.parsed_desc.customers ? `<span class="section-label">Target Customers</span><span class="section-content">${comp.parsed_desc.customers}</span>` : ''}
                    ${comp.parsed_desc.diff ? `<span class="section-label">Differentiation</span><span class="section-content">${comp.parsed_desc.diff}</span>` : ''}
                    
                    <div class="card-tags">
                        ${comp.tags.map(tag => `<span class="tag" style="color: ${tagColors[tag]||'#fff'}; border: 1px solid ${tagColors[tag]||'#fff'}40;">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        searchInput.addEventListener('input', render);
        filterCountry.addEventListener('change', render);
        filterTag.addEventListener('change', render);
        filterYear.addEventListener('change', render);
        sortSelect.addEventListener('change', render);
        render();
    </script>
